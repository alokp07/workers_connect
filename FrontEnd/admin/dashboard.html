<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - WorkersConnect</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="layout-sidebar">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="padding: var(--space-4) var(--space-6) var(--space-6);">
        <h2 style="color: var(--white-pure); font-size: var(--font-size-lg);">Workers<span style="color: var(--indigo-light);">Connect</span></h2>
        <p style="color: var(--gray-500); font-size: var(--font-size-xs); margin-bottom: 0;">Admin Panel</p>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="approvals.html" class="sidebar-link">
          <span class="icon">✅</span>
          <span>Approvals</span>
        </a>
        <a href="users.html" class="sidebar-link">
          <span class="icon">👥</span>
          <span>Users</span>
        </a>
        <a href="categories.html" class="sidebar-link">
          <span class="icon">📁</span>
          <span>Categories</span>
        </a>
        <a href="bookings.html" class="sidebar-link">
          <span class="icon">📅</span>
          <span>Bookings</span>
        </a>
        <a href="reviews.html" class="sidebar-link">
          <span class="icon">⭐</span>
          <span>Reviews</span>
        </a>
        <a href="activity-log.html" class="sidebar-link">
          <span class="icon">📋</span>
          <span>Activity Log</span>
        </a>
      </nav>

      <div style="margin-top: auto; padding-top: var(--space-6);">
        <a href="#" class="sidebar-link" id="logout-link">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>Admin Dashboard</h1>
        <p>Overview of platform activity and statistics</p>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid" id="stats-grid">
        <!-- Total Users -->
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div>
            <div class="stat-value" id="stat-total-users">
              <div class="skeleton skeleton-text" style="width: 60px; height: 28px;"></div>
            </div>
            <div class="stat-label">Total Users</div>
          </div>
        </div>

        <!-- Pending Approvals -->
        <div class="stat-card">
          <div class="stat-icon amber">⏳</div>
          <div>
            <div class="stat-value" id="stat-pending-approvals">
              <div class="skeleton skeleton-text" style="width: 60px; height: 28px;"></div>
            </div>
            <div class="stat-label">Pending Approvals</div>
          </div>
        </div>

        <!-- Total Bookings -->
        <div class="stat-card">
          <div class="stat-icon green">📅</div>
          <div>
            <div class="stat-value" id="stat-total-bookings">
              <div class="skeleton skeleton-text" style="width: 60px; height: 28px;"></div>
            </div>
            <div class="stat-label">Total Bookings</div>
          </div>
        </div>

        <!-- Total Reviews -->
        <div class="stat-card">
          <div class="stat-icon purple">⭐</div>
          <div>
            <div class="stat-value" id="stat-total-reviews">
              <div class="skeleton skeleton-text" style="width: 60px; height: 28px;"></div>
            </div>
            <div class="stat-label">Total Reviews</div>
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="card">
        <div class="card-header">
          <h3 style="font-size: var(--font-size-lg);">Recent Activity</h3>
        </div>
        <div class="card-body" id="recent-activity">
          <!-- Skeleton loaders -->
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-item-time"><div class="skeleton skeleton-text" style="width: 80px;"></div></div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 90%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time"><div class="skeleton skeleton-text" style="width: 80px;"></div></div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 85%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time"><div class="skeleton skeleton-text" style="width: 80px;"></div></div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 75%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Shared JS -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="../admin/admin.js"></script>
</body>
</html>
