<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Log - WorkersConnect Admin</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="page-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="layout-sidebar">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="padding: var(--space-4) var(--space-6) var(--space-6);">
        <h2 style="color: var(--white-pure); font-size: var(--font-size-lg);">Workers<span style="color: var(--indigo-light);">Connect</span></h2>
        <p style="color: var(--gray-500); font-size: var(--font-size-xs); margin-bottom: 0;">Admin Panel</p>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="approvals.html" class="sidebar-link">
          <span class="icon">✅</span>
          <span>Approvals</span>
        </a>
        <a href="users.html" class="sidebar-link">
          <span class="icon">👥</span>
          <span>Users</span>
        </a>
        <a href="categories.html" class="sidebar-link">
          <span class="icon">📁</span>
          <span>Categories</span>
        </a>
        <a href="bookings.html" class="sidebar-link">
          <span class="icon">📅</span>
          <span>Bookings</span>
        </a>
        <a href="reviews.html" class="sidebar-link">
          <span class="icon">⭐</span>
          <span>Reviews</span>
        </a>
        <a href="activity-log.html" class="sidebar-link active">
          <span class="icon">📋</span>
          <span>Activity Log</span>
        </a>
      </nav>

      <div style="margin-top: auto; padding-top: var(--space-6);">
        <a href="#" class="sidebar-link" id="logout-link">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>Activity Log</h1>
        <p>System events and user activity history</p>
      </div>

      <!-- Timeline -->
      <div class="card">
        <div class="card-body">
          <div class="timeline" id="activity-timeline">
            <!-- Skeleton timeline items -->
            <div class="timeline-item">
              <div class="timeline-item-time">
                <div class="skeleton skeleton-text" style="width: 80px;"></div>
              </div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 90%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time">
                <div class="skeleton skeleton-text" style="width: 80px;"></div>
              </div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 85%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time">
                <div class="skeleton skeleton-text" style="width: 80px;"></div>
              </div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 80%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time">
                <div class="skeleton skeleton-text" style="width: 80px;"></div>
              </div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 75%;"></div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-item-time">
                <div class="skeleton skeleton-text" style="width: 80px;"></div>
              </div>
              <div class="timeline-item-content">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 88%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="activity-pagination">
        <button class="pagination-btn" id="activity-prev-btn" disabled>&laquo; Prev</button>
        <span id="activity-page-info" style="font-size: var(--font-size-sm); color: var(--gray-500);">Page 1</span>
        <button class="pagination-btn" id="activity-next-btn">Next &raquo;</button>
      </div>
    </main>
  </div>

  <!-- Shared JS -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="../admin/admin.js"></script>
</body>
</html>
