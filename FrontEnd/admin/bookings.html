<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings - WorkersConnect Admin</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="page-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="layout-sidebar">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="padding: var(--space-4) var(--space-6) var(--space-6);">
        <h2 style="color: var(--white-pure); font-size: var(--font-size-lg);">Workers<span style="color: var(--indigo-light);">Connect</span></h2>
        <p style="color: var(--gray-500); font-size: var(--font-size-xs); margin-bottom: 0;">Admin Panel</p>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="approvals.html" class="sidebar-link">
          <span class="icon">✅</span>
          <span>Approvals</span>
        </a>
        <a href="users.html" class="sidebar-link">
          <span class="icon">👥</span>
          <span>Users</span>
        </a>
        <a href="categories.html" class="sidebar-link">
          <span class="icon">📁</span>
          <span>Categories</span>
        </a>
        <a href="bookings.html" class="sidebar-link active">
          <span class="icon">📅</span>
          <span>Bookings</span>
        </a>
        <a href="reviews.html" class="sidebar-link">
          <span class="icon">⭐</span>
          <span>Reviews</span>
        </a>
        <a href="activity-log.html" class="sidebar-link">
          <span class="icon">📋</span>
          <span>Activity Log</span>
        </a>
      </nav>

      <div style="margin-top: auto; padding-top: var(--space-6);">
        <a href="#" class="sidebar-link" id="logout-link">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>All Bookings</h1>
        <p>Monitor all bookings across the platform</p>
      </div>

      <!-- Toolbar: Status Filter -->
      <div class="toolbar">
        <div class="filter-chips" id="bookings-status-filter">
          <button class="filter-chip active" data-status="all">All</button>
          <button class="filter-chip" data-status="pending">Pending</button>
          <button class="filter-chip" data-status="accepted">Accepted</button>
          <button class="filter-chip" data-status="completed">Completed</button>
          <button class="filter-chip" data-status="declined">Declined</button>
          <button class="filter-chip" data-status="cancelled">Cancelled</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-container" id="bookings-table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Worker</th>
              <th>Category</th>
              <th>Description</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookings-table-body">
            <!-- Skeleton rows -->
            <tr>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 180px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 80px;"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 180px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 80px;"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 180px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 80px;"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 110px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 180px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 90px;"></div></td>
              <td><div class="skeleton skeleton-text" style="width: 80px;"></div></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="bookings-pagination">
        <button class="pagination-btn" id="bookings-prev-btn" disabled>&laquo; Prev</button>
        <span id="bookings-page-info" style="font-size: var(--font-size-sm); color: var(--gray-500);">Page 1</span>
        <button class="pagination-btn" id="bookings-next-btn">Next &raquo;</button>
      </div>
    </main>
  </div>

  <!-- Shared JS -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="../admin/admin.js"></script>
</body>
</html>
