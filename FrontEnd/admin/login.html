<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - WorkersConnect</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="auth-page">
    <div class="auth-overlay"></div>

    <div class="auth-card animate-fadeInUp">
      <!-- Logo -->
      <div class="auth-logo">
        <h1>Workers<span>Connect</span></h1>
        <p>Platform Administration</p>
      </div>

      <!-- Role Badge -->
      <div style="text-align: center;">
        <span class="auth-role-badge admin">Admin</span>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="admin-login-form">
        <div class="form-group">
          <label class="form-label" for="email">Admin Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter admin email"
            required
          >
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter admin password"
            required
          >
          <span class="form-error" id="password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <!-- Notice -->
      <div style="margin-top: var(--space-6); padding: var(--space-4); background: #F3E8FF; border: 1px solid #D8B4FE; border-radius: var(--radius-lg); font-size: var(--font-size-sm); color: #6B21A8; text-align: center;">
        Admin access only. Unauthorized access is prohibited.
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <p><a href="/">Back to Home</a></p>
      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="../admin/admin.js"></script>
</body>
</html>
