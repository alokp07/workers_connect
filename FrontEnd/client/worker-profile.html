<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Profile — WorkersConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="page-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="header">
    <a href="dashboard.html" class="header-brand">Workers<span>Connect</span></a>
    <nav class="header-nav">
      <a href="dashboard.html" class="btn btn-ghost">Browse Workers</a>
      <a href="bookings.html" class="btn btn-ghost">My Bookings</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="main-content">

    <div style="margin-bottom:var(--space-6);">
      <a href="dashboard.html" class="btn btn-ghost">← Back to Browse</a>
    </div>

    <!-- Profile Hero -->
    <div class="profile-hero animate-fadeInUp">
      <div class="profile-hero-banner">
        <div class="blob-banner"></div>
        <div class="blob-banner"></div>
      </div>
      <div class="profile-header" id="profile-header">
        <div class="profile-avatar-section">
          <div id="profile-avatar">
            <div class="avatar avatar-xl skeleton" style="width:96px;height:96px;"></div>
          </div>
        </div>
        <div class="profile-info" style="flex:1;">
          <h2 id="profile-name" class="skeleton skeleton-title" style="width:200px;height:28px;"></h2>
          <p id="profile-category" style="color:var(--brand-indigo);font-weight:600;margin-bottom:var(--space-2);">
            <span class="skeleton skeleton-text" style="width:150px;display:inline-block;"></span>
          </p>
          <p id="profile-location" style="color:var(--gray-500);font-size:var(--font-size-sm);margin-bottom:var(--space-1);">
            <span class="skeleton skeleton-text" style="width:120px;display:inline-block;"></span>
          </p>
          <p id="profile-experience" style="color:var(--gray-500);font-size:var(--font-size-sm);margin-bottom:var(--space-2);">
            <span class="skeleton skeleton-text" style="width:180px;display:inline-block;"></span>
          </p>
          <span id="profile-availability" class="badge" style="margin-bottom:var(--space-4);"></span>
          <div class="profile-stats">
            <div class="profile-stat">
              <div id="stat-rating-value" class="profile-stat-value skeleton" style="width:40px;height:28px;margin:0 auto 4px;"></div>
              <div id="stat-rating-stars"></div>
              <div class="profile-stat-label">Rating</div>
            </div>
            <div class="profile-stat">
              <div id="stat-reviews-value" class="profile-stat-value skeleton" style="width:40px;height:28px;margin:0 auto 4px;"></div>
              <div class="profile-stat-label">Reviews</div>
            </div>
            <div class="profile-stat">
              <div id="stat-experience-value" class="profile-stat-value skeleton" style="width:40px;height:28px;margin:0 auto 4px;"></div>
              <div class="profile-stat-label">Yrs Exp.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Hire CTA strip -->
    <div class="hire-cta-strip animate-fadeInUp" style="animation-delay:0.1s;" id="hire-section">
      <div>
        <h3>Ready to hire this worker?</h3>
        <p>Send a booking request and get started today</p>
      </div>
      <a href="#" class="btn btn-primary btn-lg" id="hire-btn" style="display:none;">💼 Hire This Worker</a>
    </div>

    <!-- Bio -->
    <div class="section-card animate-fadeInUp" style="animation-delay:0.15s;" id="bio-section">
      <div class="section-card-header">
        <div class="section-icon">👤</div>
        About
      </div>
      <div class="section-card-body" id="bio-content">
        <div class="skeleton skeleton-text" style="width:100%;"></div>
        <div class="skeleton skeleton-text" style="width:90%;"></div>
        <div class="skeleton skeleton-text" style="width:75%;"></div>
      </div>
    </div>

    <!-- Skills -->
    <div class="section-card animate-fadeInUp" style="animation-delay:0.2s;" id="skills-section">
      <div class="section-card-header">
        <div class="section-icon">⚡</div>
        Skills
      </div>
      <div class="section-card-body">
        <div class="skills-list" id="skills-list">
          <div class="skeleton tag" style="width:80px;height:28px;"></div>
          <div class="skeleton tag" style="width:100px;height:28px;"></div>
          <div class="skeleton tag" style="width:70px;height:28px;"></div>
          <div class="skeleton tag" style="width:90px;height:28px;"></div>
        </div>
      </div>
    </div>

    <!-- Portfolio -->
    <div class="section-card animate-fadeInUp" style="animation-delay:0.25s;" id="portfolio-section">
      <div class="section-card-header">
        <div class="section-icon">🖼️</div>
        Portfolio
      </div>
      <div class="section-card-body">
        <div class="portfolio-grid" id="portfolio-grid">
          <div class="portfolio-item"><div class="skeleton" style="width:100%;height:100%;"></div></div>
          <div class="portfolio-item"><div class="skeleton" style="width:100%;height:100%;"></div></div>
          <div class="portfolio-item"><div class="skeleton" style="width:100%;height:100%;"></div></div>
        </div>
      </div>
    </div>

    <!-- Reviews -->
    <div class="animate-fadeInUp" style="animation-delay:0.3s;" id="reviews-section">
      <h3 style="font-family:var(--font-heading);margin-bottom:var(--space-4);font-size:var(--font-size-2xl);">Client Reviews</h3>

      <div class="review-list stagger" id="reviews-list">
        <div class="review-card">
          <div class="review-card-header">
            <div class="review-card-user">
              <div class="skeleton skeleton-avatar"></div>
              <div>
                <div class="skeleton skeleton-text" style="width:120px;"></div>
                <div class="skeleton skeleton-text" style="width:80px;"></div>
              </div>
            </div>
            <div class="skeleton" style="width:80px;height:16px;"></div>
          </div>
          <div class="skeleton skeleton-text" style="width:100%;margin-top:12px;"></div>
          <div class="skeleton skeleton-text" style="width:80%;"></div>
        </div>
        <div class="review-card">
          <div class="review-card-header">
            <div class="review-card-user">
              <div class="skeleton skeleton-avatar"></div>
              <div>
                <div class="skeleton skeleton-text" style="width:120px;"></div>
                <div class="skeleton skeleton-text" style="width:80px;"></div>
              </div>
            </div>
            <div class="skeleton" style="width:80px;height:16px;"></div>
          </div>
          <div class="skeleton skeleton-text" style="width:100%;margin-top:12px;"></div>
          <div class="skeleton skeleton-text" style="width:80%;"></div>
        </div>
      </div>

      <div class="empty-state" id="reviews-empty" style="display:none;">
        <div class="empty-state-icon">⭐</div>
        <h3>No Reviews Yet</h3>
        <p>Be the first to hire and review this worker!</p>
      </div>

      <div id="reviews-pagination"></div>
    </div>

  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="client.js"></script>
</body>
</html>
