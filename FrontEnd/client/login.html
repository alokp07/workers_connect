<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login - WorkersConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-overlay"></div>

    <div class="auth-card animate-fadeInUp">
      <!-- Logo -->
      <div class="auth-logo">
        <h1>Workers<span>Connect</span></h1>
        <p>Sign in to find workers for your projects</p>
      </div>

      <!-- Role Badge -->
      <div style="text-align: center;">
        <span class="auth-role-badge client">&#128100; Client</span>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
          <span class="form-error" id="password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <!-- Footer Links -->
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

      <div class="auth-footer" style="margin-top: var(--space-3);">
        <a href="/">&#8592; Back to Home</a>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="client.js"></script>
</body>
</html>
