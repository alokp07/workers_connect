  <!-- Header -->
  <header class="header">
    <a href="dashboard.html" class="header-brand">
      Workers<span>Connect</span>
    </a>
    <nav class="header-nav">
      <a href="dashboard.html" class="btn btn-ghost">Browse Workers</a>
      <a href="bookings.html" class="btn btn-ghost">My Bookings</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Page Header -->
    <div class="page-header">
      <h1>Browse Workers</h1>
      <p>Find skilled professionals for your projects</p>
    </div>

    <!-- Filters Bar -->
    <div class="filters-bar" id="filters-bar">
      <div class="search-bar">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" placeholder="Search workers by name or skill...">
      </div>

      <div class="form-group" style="margin-bottom: 0; min-width: 160px;">
        <select class="form-select" id="category-filter">
          <option value="">All Categories</option>
          <!-- Populated by JS -->
        </select>
      </div>

      <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
        <input type="text" class="form-input" id="location-filter" placeholder="Location...">
      </div>

      <div class="form-group" style="margin-bottom: 0; min-width: 140px;">
        <select class="form-select" id="rating-filter">
          <option value="">Any Rating</option>
          <option value="4">4+ Stars</option>
          <option value="3">3+ Stars</option>
          <option value="2">2+ Stars</option>
          <option value="1">1+ Stars</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
        <select class="form-select" id="sort-filter">
          <option value="">Sort By</option>
          <option value="rating_desc">Rating: High to Low</option>
          <option value="rating_asc">Rating: Low to High</option>
          <option value="experience_desc">Experience: Most</option>
          <option value="experience_asc">Experience: Least</option>
          <option value="name_asc">Name: A-Z</option>
          <option value="name_desc">Name: Z-A</option>
        </select>
      </div>
    </div>

    <!-- Workers Grid -->
    <div class="worker-grid" id="workers-grid">
      <!-- Skeleton loaders (default content) -->
      <div class="worker-card">
        <div class="worker-card-header">
          <div class="skeleton skeleton-avatar" style="width: 48px; height: 48px;"></div>
          <div style="flex: 1;">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 50%;"></div>
          </div>
        </div>
        <div class="worker-card-body">
          <div class="skeleton skeleton-text" style="width: 90%;"></div>
          <div class="skeleton skeleton-text" style="width: 70%;"></div>
          <div class="skeleton skeleton-text" style="width: 60%; margin-top: 12px;"></div>
        </div>
        <div class="worker-card-footer">
