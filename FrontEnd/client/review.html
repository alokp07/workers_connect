<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review — WorkersConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="page-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="header">
    <a href="dashboard.html" class="header-brand">Workers<span>Connect</span></a>
    <nav class="header-nav">
      <a href="dashboard.html" class="btn btn-ghost">Browse Workers</a>
      <a href="bookings.html" class="btn btn-ghost">My Bookings</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="main-content" style="max-width:720px;">

    <div style="margin-bottom:var(--space-6);">
      <a href="bookings.html" class="btn btn-ghost">← Back to Bookings</a>
    </div>

    <div class="section-card animate-fadeInUp">
      <div class="section-card-header">
        <div class="section-icon">⭐</div>
        Leave a Review
      </div>
      <div class="section-card-body">

        <!-- Booking summary -->
        <div class="worker-preview-card" id="booking-summary">
          <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-3);">
            <div class="skeleton skeleton-avatar" style="width:52px;height:52px;flex-shrink:0;border-radius:50%;"></div>
            <div style="flex:1;">
              <div class="skeleton skeleton-title" style="width:160px;"></div>
              <div class="skeleton skeleton-text" style="width:120px;"></div>
            </div>
          </div>
          <div class="skeleton skeleton-text" style="width:100%;"></div>
          <div class="skeleton skeleton-text" style="width:70%;"></div>
        </div>

        <!-- Review Form -->
        <form id="review-form" novalidate>
          <div class="form-group">
            <label class="form-label">Your Rating</label>
            <div class="star-rating" id="star-rating" style="font-size:2.5rem;gap:8px;margin-bottom:var(--space-2);">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="rating" name="rating" value="0">
            <span class="form-error" id="rating-error"></span>
            <span class="form-hint" id="rating-hint">Click a star to rate your experience</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="comment">Your Review</label>
            <textarea id="comment" name="comment" class="form-textarea" placeholder="Share your honest experience — quality of work, punctuality, professionalism..." rows="6" required></textarea>
            <span class="form-error" id="comment-error"></span>
            <span class="form-hint">Your review helps other clients make informed decisions.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-review-btn">
            Submit Review →
          </button>
        </form>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="client.js"></script>
</body>
</html>
