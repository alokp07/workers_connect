<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review - WorkersConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="dashboard.html" class="header-brand">
      Workers<span>Connect</span>
    </a>
    <nav class="header-nav">
      <a href="dashboard.html" class="btn btn-ghost">Browse Workers</a>
      <a href="bookings.html" class="btn btn-ghost">My Bookings</a>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="main-content" style="max-width: 700px;">
    <!-- Back Link -->
    <div style="margin-bottom: var(--space-6);">
      <a href="bookings.html" class="btn btn-ghost">&#8592; Back to Bookings</a>
    </div>

    <div class="card animate-fadeInUp">
      <div class="card-header">
        <h3>&#9733; Leave a Review</h3>
      </div>

      <div class="card-body">
        <!-- Booking Summary -->
        <div id="booking-summary" style="padding: var(--space-4); background: var(--gray-50); border-radius: var(--radius-md); margin-bottom: var(--space-6);">
          <!-- Skeleton loader -->
          <div style="display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-3);">
            <div class="skeleton skeleton-avatar" style="width: 48px; height: 48px;"></div>
            <div style="flex: 1;">
              <div class="skeleton skeleton-title" style="width: 160px;"></div>
              <div class="skeleton skeleton-text" style="width: 120px;"></div>
            </div>
          </div>
          <div class="skeleton skeleton-text" style="width: 100%;"></div>
          <div class="skeleton skeleton-text" style="width: 70%;"></div>
        </div>

        <!-- Review Form -->
        <form id="review-form" novalidate>
          <!-- Star Rating -->
          <div class="form-group">
            <label class="form-label">Your Rating</label>
            <div class="star-rating" id="star-rating">
              <span class="star" data-value="1">&#9733;</span>
              <span class="star" data-value="2">&#9733;</span>
              <span class="star" data-value="3">&#9733;</span>
              <span class="star" data-value="4">&#9733;</span>
              <span class="star" data-value="5">&#9733;</span>
            </div>
            <input type="hidden" id="rating" name="rating" value="0">
            <span class="form-error" id="rating-error"></span>
            <span class="form-hint" id="rating-hint">Click a star to rate</span>
          </div>

          <!-- Comment -->
          <div class="form-group">
            <label class="form-label" for="comment">Your Review</label>
            <textarea id="comment" name="comment" class="form-textarea" placeholder="Share your experience with this worker..." rows="5" required></textarea>
            <span class="form-error" id="comment-error"></span>
            <span class="form-hint">Your review helps other clients make informed decisions.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-review-btn">
            Submit Review
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/skeleton.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/router.js"></script>
  <script src="client.js"></script>
</body>
</html>
